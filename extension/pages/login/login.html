<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veridion AI</title>
    <link rel="stylesheet" href="login.css">
    <script src="login.js" defer></script>
</head>

<body>
    <div class="container">
        <main>
            <div class="login-header">
                <img src="LOGO VERIDION.png" alt="logo" class="logo-login">
                <h1>Faça login no Veridion AI!</h1>
            </div><br><br>
            <label for="email">Email</label>
            <input type="text" id="email" name="email" placeholder="Digite seu email"><br><br>

            <label for="senha">Crie uma senha</label>
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha"><br><br><br><br><br>

            <input type="submit" name="entrar" id="entrar">
            <a href="../cadastro/cadastro.html">
                <input type="button" id="criar" name="criar" value="Crie sua conta">
            </a>
        </main>
    </div>
</body>

</html>
